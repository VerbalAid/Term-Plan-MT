# Render — MedDRA lookup webapp (Docker; ignores a stale dashboard Start command).
# Sync blueprint OR copy settings below into the term-plan-mt service.

services:
  - type: web
    name: term-plan-mt
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: PYTHONPATH
        value: .
      - key: TERMPLAN_EMBED_MODEL
        value: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
      - key: PREWARM_SEMANTIC
        value: "false"
      - key: GROUND_FUZZY_CUTOFF
        value: "90"
      - key: LOOKUP_SEMANTIC_MIN
        value: "0.55"
      - key: LLM_API_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: LLM_MODEL_NAME
        value: mistralai/mistral-7b-instruct
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        value: neo4j
      - key: NEO4J_PASS
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: WEBAPP_PASSWORD
        sync: false
