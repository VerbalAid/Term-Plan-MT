# Render Blueprint — MedDRA Lookup Tool (standalone webapp/)
# Neo4j must be reachable (Aura or self-hosted) with MedDRA graph loaded.

services:
  - type: web
    name: meddra-lookup
    runtime: python
    rootDir: webapp
    plan: standard
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=.. uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: TERMPLAN_EMBED_MODEL
        value: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASS
        sync: false
      - key: GROUND_FUZZY_CUTOFF
        value: "90"
      - key: LOOKUP_SEMANTIC_MIN
        value: "0.55"
      - key: PREWARM_SEMANTIC
        value: "false"
      - key: LLM_API_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL_NAME
        value: mistralai/mistral-7b-instruct
