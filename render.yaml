# Render Blueprint — https://render.com/docs/blueprint-spec
# Neo4j must be reachable (Aura or self-hosted). MedDRA graph loaded separately.

services:
  - type: web
    name: termplanmt-lookup
    runtime: python
    plan: starter
    buildCommand: pip install -r webapp/requirements.txt
    startCommand: PYTHONPATH=. uvicorn webapp.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASS
        sync: false
      - key: GROUND_FUZZY_CUTOFF
        value: "90"
      - key: LOOKUP_SEMANTIC_MIN
        value: "0.55"
      - key: PREWARM_SEMANTIC
        value: "false"
