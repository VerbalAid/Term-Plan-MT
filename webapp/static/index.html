<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TermPlanMT · MedDRA Lookup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="bg-glow" aria-hidden="true"></div>
  <header class="header">
    <div class="brand">
      <span class="brand-mark">TP</span>
      <div>
        <h1>MedDRA Lookup</h1>
        <p class="tagline">String match → fuzzy → semantic · TermPlanMT</p>
      </div>
    </div>
    <a class="gh-link" href="https://github.com/VerbalAid/Term-Plan-MT" target="_blank" rel="noopener">GitHub</a>
  </header>

  <main class="main">
    <section class="search-panel">
      <form id="search-form" class="search-form" autocomplete="off">
        <div class="lang-toggle" role="group" aria-label="Search language">
          <button type="button" class="lang-btn active" data-lang="fr">French</button>
          <button type="button" class="lang-btn" data-lang="en">English</button>
        </div>
        <div class="search-row">
          <input
            id="term-input"
            type="search"
            placeholder="e.g. pneumopathie inflammatoire, pembrolizumab…"
            spellcheck="false"
            autofocus
          />
          <button type="submit" class="submit-btn" id="submit-btn">
            <span class="btn-label">Lookup</span>
            <span class="spinner" hidden></span>
          </button>
        </div>
      </form>
      <p class="hint">Exact French label → fuzzy (PT/LLT) → multilingual embedding similarity</p>
    </section>

    <section id="status" class="status" hidden></section>
    <section id="results" class="results" hidden></section>
  </main>

  <footer class="footer">
    <p>Requires Neo4j with MedDRA v28 graph · <span id="health-dot" class="health-dot"></span> <span id="health-text">checking…</span></p>
  </footer>

  <script src="/static/app.js" type="module"></script>
</body>
</html>
