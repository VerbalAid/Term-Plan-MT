<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MedDRA Lookup — Sign in</title>
  <meta name="robots" content="noindex, nofollow, noarchive" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b0f14;
      --card: #121820;
      --border: rgba(148, 163, 184, 0.12);
      --text: #e8eef6;
      --muted: #8b9cb3;
      --accent: #2dd4bf;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 1.25rem;
    }
    .card {
      width: 100%;
      max-width: 360px;
      padding: 1.75rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
    }
    h1 { margin: 0 0 0.35rem; font-size: 1.25rem; }
    p { margin: 0 0 1.25rem; color: var(--muted); font-size: 0.9rem; }
    label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 0.35rem; }
    input {
      width: 100%;
      padding: 0.75rem 0.9rem;
      font: inherit;
      font-size: 1rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.35);
      color: var(--text);
      margin-bottom: 1rem;
    }
    input:focus { outline: 2px solid var(--accent); border-color: transparent; }
    button {
      width: 100%;
      padding: 0.75rem;
      font: inherit;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #042f2e;
      cursor: pointer;
    }
    .err {
      margin-bottom: 1rem;
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      background: rgba(248, 113, 113, 0.12);
      border: 1px solid rgba(248, 113, 113, 0.35);
      color: #fecaca;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>MedDRA Lookup</h1>
    <p>Private access — use the shared password (e.g. <strong>Term10</strong>).</p>
    <!--ERROR-->
    <form method="post" action="/login">
      <input type="hidden" name="next" value="__NEXT__" />
      <label for="password">Password</label>
      <input id="password" name="password" type="password" minlength="5" autocomplete="current-password" autofocus required />
      <button type="submit">Continue</button>
    </form>
  </div>
</body>
</html>
